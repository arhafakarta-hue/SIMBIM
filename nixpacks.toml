providers = ["php"]

[phases.setup]
nixPkgs = ["...", "php82Extensions.pdo_sqlite"]

[phases.build]
cmds = [
  "mkdir -p database storage/framework/sessions storage/framework/views storage/framework/cache storage/logs",
  "touch database/database.sqlite",
  "chmod -R 775 storage bootstrap/cache database"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
